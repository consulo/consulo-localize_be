libraries.node.text.application.server:
    text: "Бібліятэкі ўтрымліваюць класы, якія дадаюць розную функцыянальнасць вашым прыкладанням. Бібліятэкі таксама ўключаюць зыходныя файлы і JavaDoc, якія дапамагаюць у распрацоўцы праектаў.<br><br>IntelliJ IDEA выкарыстоўвае бібліятэкі для аўтадапаўнення кода, валідацыі, падсветкі памылак і г.д.<br><br>Бібліятэкі сервера прыкладанняў з'яўляюцца часткай сервера прыкладанняў (WebSphere, WebLogic, Tomcat і інш.) і даступныя для веб- і Java EE прыкладанняў, настроеных для гэтых сервераў.<br><br>Разгарніце вузел і выберыце даччыныя элементы для кіравання бібліятэкамі сервера прыкладанняў, усталяванымі ў вашай сістэме.<br><br>Каб падключыць бібліятэку да модуля, выберыце модуль, націсніце ўкладку \"Залежнасці\", націсніце \"Дадаць\" і ўкажыце размяшчэнне бібліятэкі."
